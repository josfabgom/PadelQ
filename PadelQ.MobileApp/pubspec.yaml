name: padelq_mobile
description: "PadelQ Client App - For bookings and level management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_screenutil: ^5.9.0
  retrofit: ^4.1.0
  json_annotation: ^4.8.1
  dio: ^5.3.0
  firebase_messaging: ^16.1.2
  firebase_core: ^4.5.0
  cached_network_image: ^3.3.0
  go_router: ^17.1.0
  intl: ^0.20.2
  lucide_icons: ^0.257.0
  flutter_secure_storage: ^10.0.0
  jwt_decoder: ^2.0.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  retrofit_generator: ^10.2.3
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
