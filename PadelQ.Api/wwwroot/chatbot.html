<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de IA - Black Club de Pádel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.css">
    <style>
        :root {
            --bg-color: #080808;
            --card-bg: rgba(18, 18, 20, 0.8);
            --primary: #e5c158;
            --primary-glow: rgba(229, 193, 88, 0.25);
            --accent: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.15);
            --text-color: #f5f6fa;
            --text-muted: #9aa0a6;
            --border-color: rgba(255, 255, 255, 0.06);
            --user-bubble: #202023;
            --bot-bubble: rgba(229, 193, 88, 0.04);
            --bot-border: rgba(229, 193, 88, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(229, 193, 88, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 40%);
        }

        /* Contenedor principal de Chat */
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            margin: 10px;
            position: relative;
        }

        .chat-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            z-index: 10;
        }

        /* Header */
        .chat-header {
            padding: 20px;
            background: rgba(15, 17, 23, 0.7);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .chat-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .bot-avatar i {
            font-size: 20px;
            color: #0b0c10;
        }

        .bot-info h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .bot-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--primary);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .header-actions button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .header-actions button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
        }

        /* Area de Mensajes */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: rgba(11, 12, 16, 0.1);
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Burbujas de Mensaje */
        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: slideIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            border: 1px solid var(--bot-border);
            border-bottom-left-radius: 4px;
            color: var(--text-color);
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.02);
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-right-radius: 4px;
            color: var(--text-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        /* Markdown Styling inside Bubbles */
        .message p {
            margin-bottom: 8px;
        }
        .message p:last-child {
            margin-bottom: 0;
        }
        .message strong {
            color: var(--primary);
            font-weight: 600;
        }
        .message ul, .message ol {
            margin-left: 20px;
            margin-bottom: 8px;
        }
        .message li {
            margin-bottom: 4px;
        }
        .message code {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--primary);
            font-size: 0.9em;
        }

        /* Chips sugeridos */
        .suggestions-container {
            padding: 10px 20px;
            background: rgba(11, 12, 16, 0.2);
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            z-index: 2;
        }

        .suggestions-container::-webkit-scrollbar {
            height: 4px;
        }

        .suggestions-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .chip {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .chip:hover {
            background: rgba(0, 255, 204, 0.08);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.1);
        }

        /* Indicador de Escritura */
        .typing-indicator {
            align-self: flex-start;
            background: var(--bot-bubble);
            border: 1px solid var(--bot-border);
            padding: 12px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .chat-input-area {
            padding: 16px 20px;
            background: rgba(15, 17, 23, 0.8);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 2;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 2px 6px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            padding: 12px 16px;
            color: var(--text-color);
            font-size: 0.95rem;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: #0b0c10;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 10px var(--primary-glow);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 18px var(--primary-glow);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Branding footer */
        .branding-footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 8px 0;
            background: rgba(11, 12, 16, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .branding-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-profile">
                <img src="images/logo-full-white.png" alt="Black Club de Pádel" style="height: 38px; object-fit: contain;">
                <div class="bot-info" style="margin-left: 8px;">
                    <h1 style="font-size: 0.9rem; color: var(--text-muted); font-weight: 400; text-transform: uppercase; letter-spacing: 1.5px;">Asistente Virtual</h1>
                    <div class="bot-status">
                        <span class="status-dot"></span>
                        <span style="color: var(--primary);">Online</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button id="clear-chat-btn" title="Limpiar conversación">
                    <i class="class-lucide icon-trash-2"></i>
                </button>
            </div>
        </div>

        <!-- Area de Mensajes -->
        <div class="chat-messages" id="chat-messages">
            <!-- Mensaje Inicial -->
            <div class="message bot">
                <p>¡Hola! 🎾 Soy tu **Asistente Virtual de Black Club**.</p>
                <p>Estoy aquí para decirte qué turnos y canchas están disponibles y ayudarte a reservar en segundos. ¿En qué puedo ayudarte hoy?</p>
            </div>
        </div>

        <!-- Chips sugeridos -->
        <div class="suggestions-container">
            <div class="chip" onclick="sendSuggestion('¿Qué turnos hay libres hoy?')">
                <i class="class-lucide icon-calendar"></i> ¿Qué hay libre hoy?
            </div>
            <div class="chip" onclick="sendSuggestion('¿Qué canchas están libres mañana por la tarde?')">
                <i class="class-lucide icon-clock"></i> Libres mañana tarde
            </div>
            <div class="chip" onclick="sendSuggestion('Quiero reservar un turno')">
                <i class="class-lucide icon-plus-circle"></i> Reservar turno
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" class="chat-input" id="chat-input" placeholder="Pregúntale a Black Club AI..." autocomplete="off">
            </div>
            <button class="send-btn" id="send-btn">
                <i class="class-lucide icon-send"></i>
            </button>
        </div>

        <!-- Footer -->
        <div class="branding-footer">
            Powered by <a href="#" target="_blank">Black Club AI Engine</a>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const clearChatBtn = document.getElementById('clear-chat-btn');

        // Historial en memoria de la sesión
        let conversationHistory = [];

        // Parseador simple de markdown
        function parseMarkdown(text) {
            if (!text) return "";
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>')
                .replace(/- (.*?)(<br>|$)/g, '<li>$1</li>');
        }

        // Agregar mensaje en pantalla
        function appendMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = parseMarkdown(text);
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        // Desplazar hacia abajo
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Mostrar u ocultar indicador de escritura
        let typingIndicator = null;
        function showTypingIndicator() {
            if (typingIndicator) return;
            typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatMessages.appendChild(typingIndicator);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            if (typingIndicator) {
                typingIndicator.remove();
                typingIndicator = null;
            }
        }

        // Enviar mensaje al API
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            chatInput.value = '';
            showTypingIndicator();

            try {
                const response = await fetch('/api/chatbot/public-chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        history: conversationHistory
                    })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error(`Error en el servidor: ${response.status}`);
                }

                const data = await response.json();
                
                // Mostrar respuesta del bot
                appendMessage('bot', data.reply);

                // Guardar en el historial
                conversationHistory.push({ role: 'user', text: message });
                conversationHistory.push({ role: 'model', text: data.reply });

            } catch (error) {
                removeTypingIndicator();
                appendMessage('bot', `⚠️ **Error:** No se pudo conectar con el asistente virtual de Black Club. Detalle: ${error.message}`);
            }
        }

        // Enviar mensaje mediante sugerencias (chips)
        function sendSuggestion(text) {
            chatInput.value = text;
            sendMessage();
        }

        // Limpiar chat
        function clearChat() {
            chatMessages.innerHTML = `
                <div class="message bot">
                    <p>¡Hola de nuevo! 🎾 Conversación reiniciada.</p>
                    <p>Dime qué día y horario quieres jugar y te diré qué canchas están libres para reservar.</p>
                </div>
            `;
            conversationHistory = [];
        }

        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        clearChatBtn.addEventListener('click', clearChat);
    </script>
</body>
</html>
